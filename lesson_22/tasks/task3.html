<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://fonts.googleapis.com/css?family=Bebas+Neue:regular" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css?family=Fira+Sans:300,regular,700" rel="stylesheet">
	<link rel="stylesheet" href="../../css/style.css">
	<title>Task 19</title>
</head>


<body>
	<div class="wrapper">
		<header class="header">
			<div class="header__container">
				<a href="../index.html" class="header__logo">
					Dasha Petrischeva
				</a>
			</div>
		</header>
		<main class="page">
			<div class="article">
				<div class="article__container">
					<h1>Task 19</h1>
					<div class="task">

						<div class="task__description">
							<p class="mb">Save the list of tasks that the user needs to complete (save to localStorage).
								Periodically randomly select a task and display it to the user (using confirm). If the user
								clicks "OK", delete that task.</p>

						</div>
						<h2>Add Task</h2>
						<form action="#" method="GET" class="form form--add-task">
							<div class="form__field field">
								<label for="title" class="field__label">Task Title:</label>
								<input id="title" type="text" class="field__input">
							</div>
							<div class="form__field field">
								<label for="priority" class="field__label">Priority:</label>
								<input id="priority" type="number" class="field__input">
							</div>
							<div class="form__buttons">
								<button type="button" class="addTask">Add Task</button>
							</div>

						</form>
						<h2>Task List</h2>
						<ul class="todo-list"></ul>



					</div>
				</div>
			</div>
		</main>
		<footer class="footer">
			<div class="footer__container">
				© 2025 Dasha Petrischeva
			</div>
		</footer>
	</div>
	<script src="../js/script3.js"></script>
</body>

</html>
