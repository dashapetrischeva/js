<body>
	<div class="wrapper">
		<header class="header">
			<div class="header__container">
				<a href="../index.html" class="header__logo">
					Dasha Petrischeva
				</a>
			</div>
		</header>
		<main class="page">
			<div class="article">
				<div class="article__container">
					<h1>Task 9</h1>
					<div class="task">

						<h2>
							Given an array of names. Form an array with the first letters of these names.
						</h2>
						<script>

							if (confirm('Start testing?')) {
								const listNames = ['Ivan', 'Maria', 'Volodumur', 'Petro', 'Dmutro', 'Oksana']
								document.write(`
							<h2 class="title-solution">Solution:</h2>
							<div>Array of names: ${listNames} </div>
							<hr>
							`)
								const listFirstLetters = listNames.map(name => name[0])
								document.write(`
							<div>Array of first letters of names:<strong> ${listFirstLetters} </strong></div>
							`)
							}
						</script>

					</div>
				</div>
			</div>
		</main>
