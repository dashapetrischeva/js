				<div class="article__container">
					<h1>Task 8</h1>
					<div class="task">

						<h2>
							Given an array of car numbers. Form a new array of those that start with «A»
						</h2>
						<script>

							if (confirm('Start testing?')) {
								const listCarNumbers = ['AA2457BC', 'BK9234CE', 'CA1048EP', 'KA5632HI', 'BI4789HT', 'AB9012KM', 'CB3377HE', 'AX5520KP', 'BH7421ME', 'AE6193PC']
								document.write(`
							<h2 class="title-solution">Solution:</h2>
							<div>Array of car numbers: ${listCarNumbers} </div>
							<hr>
							`)
								let newListCarNumbers = []
								for (const carNumber of listCarNumbers) {
									if (carNumber[0] === 'A') {
										newListCarNumbers.push(carNumber)
									}
								}
								document.write(`
				
							<div>Array of car numbers starting with "A":<strong> ${newListCarNumbers} </strong></div>
							`)
							}
						</script>

					</div>
				</div>
			</div>
