<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://fonts.googleapis.com/css?family=Bebas+Neue:regular" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css?family=Fira+Sans:300,regular,700" rel="stylesheet">
	<link rel="stylesheet" href="../../css/style.css">
	<title>Task 1</title>
</head>


<body>
	<div class="wrapper">
		<header class="header">
			<div class="header__container">
				<a href="../index.html" class="header__logo">
					Dasha Petrischeva
				</a>
			</div>
		</header>
		<main class="page">
			<div class="article">
				<div class="article__container">
					<h1>Task 1</h1>
					<div class="task">

						<div class="task-description">
							<p>User enters the number of elements. Create an array consisting of the specified number of
								elements filled with zeros.</p>
						</div>
						<script>
							if (confirm('Start testing?')) {
								const elementsNumber = parseInt(prompt('Enter the number of elements', '5'))
								let arr = new Array(elementsNumber).fill(0)
								document.write(`
							<h2 class="title-solution">Solution:</h2>
							<div>Number of elements: ${elementsNumber} </div>
							<hr>
								<div>Array: ${arr} </div>`)
							}




						</script>

					</div>
				</div>
			</div>
		</main>
		<footer class="footer">
			<div class="footer__container">
				© 2025 Dasha Petrischeva
			</div>
		</footer>
	</div>
</body>

</html>
