<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://fonts.googleapis.com/css?family=Bebas+Neue:regular" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css?family=Fira+Sans:300,regular,700" rel="stylesheet">
	<link rel="stylesheet" href="../../css/style.css">
	<title>Task 2</title>
</head>


<body>
	<div class="wrapper">
		<header class="header">
			<div class="header__container">
				<a href="../index.html" class="header__logo">
					Dasha Petrischeva
				</a>
			</div>
		</header>
		<main class="page">
			<div class="article">
				<div class="article__container">
					<h1>Task 2</h1>
					<div class="task">

						<div class="task__description">
							<p class="title"> Currency Converter</p>
						</div>

						<form action="#" method="GET" class="form">
							<div class="form__field field">
								<label for="sumUAH" class="field__label">Amount in UAH:</label>
								<input id="sumUAH" type="number" class="field__input" value="0">
							</div>

							<div class="form__buttons">
								<button id="convert" type="button">Convert</button>

							</div>
							<div class="form__field result-convert">
								<label for="sumUSD" class="result-convert__label">Amount in USD:</label>
								<input id="sumUSD" type="number" class="result-convert__input " step="any" value="0">
							</div>
							<div class="form__field result-convert">
								<label for="sumEUR" class="result-convert__label">Amount in EUR:</label>
								<input id="sumEUR" type="number" class="result-convert__input" step="any" value="0">
							</div>
						</form>


					</div>
				</div>
			</div>
		</main>
		<footer class="footer">
			<div class="footer__container">
				© 2025 Dasha Petrischeva
			</div>
		</footer>
	</div>
	<script src="../js/script2.js"></script>
</body>

</html>
