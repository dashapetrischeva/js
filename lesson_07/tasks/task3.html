		<main class="page">
			<div class="article">
				<div class="article__container">
					<h1>Task 3</h1>
					<div class="task">

						<div class="task-description">
							<p>Create separate functions that convert:</p>
							<p>1) Centimeters to inches;</p>
							<p>2) Kilograms to pounds;</p>
							<p>3) Kilometers to miles.</p>

						</div>
						<script>
							if (confirm('Start testing?')) {
								function cmToInches(cm) {
									return cm / 2.54
								}
								function kgToPounds(kg) {
									return kg * 2.205
								}
								function kmToMiles(km) {
									return km / 1.609

								}
								const cmNumber = parseFloat(prompt(`Enter the number of centimeters`, '345'))
								const kgNumber = parseFloat(prompt(`Enter the number of kilograms`, '15'))
								const kmNumber = parseFloat(prompt(`Enter the number of kilometers`, '250'))
								document.write(`
							<h2 class="title-solution">Solution:</h2>
							<p> ${cmNumber} cm = ${cmToInches(cmNumber).toFixed(2)} inches </p>
							<p> ${kgNumber} kg = ${kgToPounds(kgNumber).toFixed(2)} pounds </p>
							<p> ${kmNumber} km = ${kmToMiles(kmNumber).toFixed(2)} miles </p>
							`)
							}

						</script>

					</div>
				</div>
			</div>
		</main>
