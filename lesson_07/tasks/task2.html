<body>
	<div class="wrapper">
		<header class="header">
			<div class="header__container">
				<a href="../index.html" class="header__logo">
					Dasha Petrischeva
				</a>
			</div>
		</header>
		<main class="page">
			<div class="article">
				<div class="article__container">
					<h1>Task 2</h1>
					<div class="task">

						<div class="task-description">
							<p>Create separate functions that calculate the following for four numbers:</p>

							<p>1) The sum;</p>
							<p>2) The product;</p>
							<p>3) The arithmetic mean;</p>
							<p>4) The minimum value.</p>
						</div>
						<script>
							if (confirm('Start testing?')) {
								function getSum(num1, num2, num3, num4) {
									return num1 + num2 + num3 + num4
								}
								function getProduct(num1, num2, num3, num4) {
									return num1 * num2 * num3 * num4
								}
								function getArithmeticMean(num1, num2, num3, num4) {
									return (num1 + num2 + num3 + num4) / 4
								}
								function getMin(num1, num2, num3, num4) {
									let min = num1
									if (num2 < min) min = num2
									if (num3 < min) min = num3
									if (num4 < min) min = num4
									return min
								}
								const num1 = parseFloat(prompt(`Enter the first number`, '5'))
								const num2 = parseFloat(prompt(`Enter the second number`, '5'))
								const num3 = parseFloat(prompt(`Enter the third number`, '5'))
								const num4 = parseFloat(prompt(`Enter the fourth number`, '5'))

								document.write(`
							<h2 class="title-solution">Solution:</h2>
							<p><strong>Sum </strong>= ${getSum(num1, num2, num3, num4)}</p>
							<p> <strong>Product</strong> = ${getProduct(num1, num2, num3, num4)}</p>
							<p> <strong>Arithmetic Mean</strong> = ${getArithmeticMean(num1, num2, num3, num4)}</p>
							<p> <strong>Minimum Value</strong> = ${getMin(num1, num2, num3, num4)}</p>
							`)
							}
						</script>

					</div>
				</div>
			</div>
		</main>

</body>
