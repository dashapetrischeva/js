<!DOCTYPE html>
<html lang="uk">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
	<div class="wrapper">
		<header class="header">
			<div class="header__container">
				<a href="../index.html" class="header__logo">
					Dasha Petrischeva
				</a>
			</div>
		</header>
		<main class="page">
			<div class="article">
				<div class="article__container">
					<h1>Task 2</h1>
					<div class="task">

						<h2>
							Enter the initial value of the sum from the keyboard. While the sum is less than 100, add numbers
							to it,
							which are entered from the keyboard.
						</h2>
						<script>
							let sum = parseFloat(prompt(`Enter the initial value of the sum`, '20'))
							while (sum < 100) {
								sum += parseFloat(prompt(`Sum = ${sum}. Enter a number`, '10'))
							}
							document.write(`
							<h2 class="title-solution">Solution:</h2>
							<p>We are done. Sum = ${sum} </p>`)
						</script>

					</div>
				</div>
			</div>
		</main>

			</div>
		</footer>
	</div>
</body>
